<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorama de Vocales</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg: #e0f7fa;
            --text: #2f3542;
            --card-back: #4ecdc4;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(var(--accent) 3px, transparent 3px);
            background-size: 40px 40px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--primary);
            text-shadow: 3px 3px 0px white, 5px 5px 0px var(--accent);
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .stats {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 2rem;
            background: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            border: 4px solid var(--accent);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 900px;
            padding: 20px;
            perspective: 1000px;
        }

        @media (max-width: 600px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 400px) {
            .game-board {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card {
            width: 110px;
            height: 140px;
            background: transparent;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .card:hover {
            transform: scale(1.05);
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            font-weight: bold;
            user-select: none;
        }

        .card-front {
            background: white;
            transform: rotateY(180deg);
            border: 6px solid var(--primary);
        }

        .card-back {
            background-color: var(--card-back);
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)),
                linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2));
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            border: 6px solid white;
            font-size: 4rem;
            color: white;
        }

        .card.matched .card-front {
            background-color: #d4edda;
            border-color: #28a745;
            color: #155724;
            box-shadow: 0 0 20px #28a745;
            animation: pulse 1s;
        }

        @keyframes pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        /* Vowel colors */
        .vowel-A { color: #e74c3c; }
        .vowel-E { color: #3498db; }
        .vowel-I { color: #f1c40f; }
        .vowel-O { color: #9b59b6; }
        .vowel-U { color: #e67e22; }

        .btn {
            margin-top: 2rem;
            margin-bottom: 2rem;
            padding: 1rem 2.5rem;
            font-size: 1.8rem;
            font-family: inherit;
            background-color: var(--primary);
            color: white;
            border: 4px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d63031;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }
        
        .btn:hover {
            background-color: #ff5252;
        }

        .win-message {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .win-message.active {
            opacity: 1;
            pointer-events: all;
        }

        .win-title {
            font-size: 6rem;
            color: var(--primary);
            margin: 0;
            text-align: center;
            text-shadow: 4px 4px 0px var(--accent);
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-20px) scale(1.05); }
        }

        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #f00;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0deg); }
            to { transform: translateY(110vh) rotate(720deg); }
        }
    </style>
</head>
<body>

    <h1>¡Memorama de Vocales! 🌟</h1>
    
    <div class="stats">
        <div>Intentos: <span id="moves" style="color: #e74c3c; font-weight: bold;">0</span></div>
        <div>Pares: <span id="matches" style="color: #28a745; font-weight: bold;">0</span>/5</div>
    </div>

    <div class="game-board" id="board">
        <!-- Las cartas se generan con JavaScript -->
    </div>

    <button class="btn" onclick="initGame()">🔄 Jugar Otra Vez</button>

    <div class="win-message" id="win-message">
        <h2 class="win-title">¡Felicidades! 🎉</h2>
        <p style="font-size: 2.5rem; color: #4ecdc4; text-align: center; font-weight: bold;">¡Encontraste todas las vocales!</p>
        <button class="btn" onclick="initGame()">🌟 Jugar de nuevo 🌟</button>
    </div>

    <script>
        const vowels = ['A', 'E', 'I', 'O', 'U'];
        let cards = [];
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let moves = 0;
        let matches = 0;

        const board = document.getElementById('board');
        const movesEl = document.getElementById('moves');
        const matchesEl = document.getElementById('matches');
        const winMessage = document.getElementById('win-message');

        // Pronunciar la vocal usando la API de síntesis de voz
        function playSound(text) {
            // Cancelar si ya está leyendo algo
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX'; // Español de México
            utterance.rate = 0.85; // Velocidad amigable para niños
            utterance.pitch = 1.3; // Tono más agudo/infantil
            window.speechSynthesis.speak(utterance);
        }

        function playWinSound() {
            playSound("¡Felicidades! Lo hiciste muy bien.");
        }

        function createConfetti() {
            // Remover confeti anterior si existe
            document.querySelectorAll('.confetti').forEach(e => e.remove());
            
            for(let i=0; i<80; i++) {
                let conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = -10 + 'vh';
                conf.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.animationDelay = Math.random() * 2 + 's';
                // Formas aleatorias
                if (Math.random() > 0.5) conf.style.borderRadius = '50%';
                
                winMessage.appendChild(conf);
            }
        }

        function initGame() {
            // Reiniciar el estado
            board.innerHTML = '';
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            moves = 0;
            matches = 0;
            movesEl.innerText = moves;
            matchesEl.innerText = matches;
            winMessage.classList.remove('active');
            window.speechSynthesis.cancel();
            
            // Generar pares de cartas
            cards = [...vowels, ...vowels];
            
            // Revolver cartas (Shuffle interactivo)
            cards.sort(() => 0.5 - Math.random());

            // Crear elementos HTML para cada carta
            cards.forEach(vowel => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.vowel = vowel;
                
                card.innerHTML = `
                    <div class="card-face card-front vowel-${vowel}">${vowel}</div>
                    <div class="card-face card-back">❓</div>
                `;
                
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');
            
            // Reproducir sonido al voltear
            playSound(this.dataset.vowel);

            if (!hasFlippedCard) {
                // Primer carta del par
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Segunda carta del par
            secondCard = this;
            moves++;
            movesEl.innerText = moves;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.vowel === secondCard.dataset.vowel;

            if (isMatch) {
                disableCards();
                matches++;
                matchesEl.innerText = matches;
                
                if (matches === vowels.length) {
                    setTimeout(() => {
                        winMessage.classList.add('active');
                        createConfetti();
                        playWinSound();
                    }, 800);
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                // Regresar cartas a su estado original si no coinciden
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');

                resetBoard();
            }, 1500); // 1.5 segundos da buen tiempo para que los niños vean la segunda carta
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // Inicializar al cargar la página
        initGame();
    </script>
</body>
</html>
